[bar/mybar]
width = 100%
height = 24pt
radius = 6

background = #282A2E
foreground = #C5C8C6

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = #707880

font-0 = monospace;size=10;

modules-left = i3
modules-right = date

cursor-click = pointer
cursor-scroll = ns-resize

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-padding = 1
label-mode-foreground = #000
label-mode-background = #B294BB

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = #3971ED
label-focused-underline= #fba922
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 1

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = #555555
label-visible-underline = #555555
label-visible-padding = 1

; urgent = Workspace with urgency hint
label-urgent = %index%
label-urgent-background = #900000
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = #C5C8C6

[settings]
screenchange-reload = true
pseudo-transparency = true
