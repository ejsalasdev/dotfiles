[bar/mybar]
width = 100%
height = 24pt
radius = 6

background = #282A2E
foreground = #C5C8C6

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = #707880

font-0 = "JetBrains Mono:size=10;"
font-1 = "FontAwesome:style=Regular:pixelsize=10;"

modules-left = i3 xwindow
modules-right = pulseaudio memory cpu eth wlan date powermenu

cursor-click = pointer
cursor-scroll = ns-resize

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-padding = 1
label-mode-foreground = #000
label-mode-background = #B294BB

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = #3971ED
label-focused-underline= #fba922
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 1

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = #555555
label-visible-underline = #555555
label-visible-padding = 1

; urgent = Workspace with urgency hint
label-urgent = %index%
label-urgent-background = #900000
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-empty = "Desktop"

[module/pulseaudio]
type = internal/pulseaudio

; Sink to be used, if it exists (find with `pacmd list-sinks`, name is in `<>`)
; sink = alsa_output.pci-0000_00_1b.0.analog-stereo

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted =  muted
label-muted-foreground = #666

; Icons for different volume levels
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = #fba922
; Show used memory in GB
label = %gb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = #fba922
label = %percentage:2%%

[module/wlan]
type = internal/network
interface = ${env:POLYBAR_WLAN_INTERFACE}
interval = 3.0

format-connected = <label-connected>
label-connected =  %essid%

format-disconnected =

[module/eth]
type = internal/network
interface = ${env:POLYBAR_ETH_INTERFACE}
interval = 3.0

format-connected = <label-connected>
label-connected =  %ifname%

format-disconnected =

[module/date]
type = internal/date
interval = 1

date =  %H:%M
date-alt =  %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = #C5C8C6

[module/powermenu]
type = custom/text
format = 
format-foreground = #cc241d
click-left = ~/.config/rofi/scripts/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
